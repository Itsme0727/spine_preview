<!DOCTYPE html>
<html lang="zh-cn">
<head>
<meta charset="utf-8" />
<title>Spine Animation State Machine</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
:root{--bg:#121218;--panel-bg:#1c1c28;--node-bg:#262636;--accent:#4a90d9;--accent2:#9b6dff;--text:#c8c8c8;--text2:#888;--border:#33334a;--input-bg:#1c1c26;--success:#50c878;--warn:#f0a040;--connector:#7c5ce7;--shadow:0 8px 32px rgba(0,0,0,.5)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);overflow:hidden;height:100vh;width:100vw;color:var(--text)}
#app{position:relative;width:100%;height:100%}
#gridCanvas{position:absolute;top:0;left:0;z-index:1}
#connCanvas{position:absolute;top:0;left:0;z-index:4;pointer-events:none}
#connCanvas.active{pointer-events:all}
#nodesLayer{position:absolute;top:0;left:0;z-index:2;pointer-events:none}
#nodesLayer>*{pointer-events:all}

#toolbar{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:8px;padding:8px 16px;background:var(--panel-bg);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow)}
#toolbar button{background:var(--node-bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap}
#toolbar button:hover{background:var(--accent);border-color:var(--accent);color:#fff}
#toolbar button.active{background:var(--accent2);border-color:var(--accent2);color:#111}
#toolbar .sep{width:1px;background:var(--border);margin:0 4px}

#dropZone{position:fixed;inset:0;z-index:200;background:rgba(74,144,217,.12);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;pointer-events:none}
#dropZone.show{display:flex;pointer-events:all}
#dropZone .inner{border:3px dashed var(--accent);border-radius:24px;padding:60px 80px;text-align:center;color:var(--accent2);font-size:1.4em;background:rgba(18,18,24,.92)}
#dropZone .inner .icon{font-size:3em;margin-bottom:16px}
#dropZone .inner .sub{font-size:.6em;color:var(--text2);margin-top:8px}

.spine-node{position:absolute;background:var(--panel-bg);border:2px solid var(--border);border-radius:16px;box-shadow:var(--shadow);min-width:260px;transition:border-color .3s;width:fit-content}
.spine-node:hover{border-color:var(--accent2)}
.spine-node.selected{border-color:var(--accent);box-shadow:0 0 24px rgba(233,69,96,.3)}
.spine-node .header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--node-bg);border-radius:14px 14px 0 0;cursor:grab;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;user-select:none}
.spine-node .header .name{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.spine-node .header .btns{display:flex;gap:4px}
.spine-node .header .btns button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;transition:all .2s}
.spine-node .header .btns button:hover{color:#fff;background:var(--accent)}
.spine-node .spine-canvas-wrap{position:relative;display:flex;align-items:center;justify-content:center;background:var(--bg);min-height:200px;cursor:pointer;overflow:visible}
.spine-node .spine-canvas-wrap canvas{display:block;flex-shrink:0}
.spine-node .footer{display:flex;align-items:center;gap:6px;padding:6px 12px;border-top:1px solid var(--border);font-size:11px;color:var(--text2);flex-wrap:wrap}
.spine-node .footer .badge{background:var(--node-bg);padding:2px 8px;border-radius:10px;font-size:10px}

.spine-node .state-list{padding:4px 8px;max-height:200px;overflow-y:auto;border-top:1px solid var(--border)}
.spine-node .state-row{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;margin:2px 0;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s;position:relative;border-left:3px solid transparent}
.spine-node .state-row:hover{background:rgba(255,255,255,.06)}
.spine-node .state-row.active{background:rgba(74,144,217,.25);color:#fff;font-weight:600}
.spine-node .state-row .state-dur{font-size:10px;color:var(--text2);margin-left:8px}
.spine-node .state-row.active .state-dur{color:rgba(255,255,255,.7)}
.spine-node .state-row .conn-dot{width:14px;height:14px;border-radius:50%;background:var(--connector);border:2px solid #fff;cursor:crosshair;opacity:0;transition:opacity .2s;flex-shrink:0}
.spine-node .state-row:hover .conn-dot{opacity:1}

.info-panel{position:absolute;left:calc(100% + 16px);top:0;width:280px;background:var(--panel-bg);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);z-index:10;font-size:12px;overflow:hidden;display:none}
.info-panel.show{display:block}
.info-panel .ip-header{padding:8px 12px;background:var(--node-bg);font-weight:600;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.info-panel .ip-body{padding:8px 12px;max-height:400px;overflow-y:auto}
.info-panel .ip-section{margin-bottom:10px}
.info-panel .ip-section .ip-title{color:var(--accent2);font-weight:600;margin-bottom:4px;font-size:11px;text-transform:uppercase}
.info-panel .ip-row{display:flex;justify-content:space-between;padding:2px 0;color:var(--text2)}
.info-panel .checkbox-row{display:flex;align-items:center;gap:8px;padding:4px 0}

#conditionEditor{position:fixed;z-index:300;background:var(--panel-bg);border:1px solid var(--accent2);border-radius:10px;padding:12px;box-shadow:var(--shadow);display:none;min-width:200px}
#conditionEditor.show{display:block}
#conditionEditor input{width:100%;background:var(--input-bg);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-size:13px;outline:none}
#conditionEditor input:focus{border-color:var(--accent2)}
#conditionEditor .actions{display:flex;gap:6px;margin-top:8px;justify-content:flex-end}
#conditionEditor .actions button{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px}
#conditionEditor .actions .ok{background:var(--accent2);color:#111}
#conditionEditor .actions .del{background:var(--accent);color:#fff}

#statusBar{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:6px 16px;background:var(--panel-bg);border-top:1px solid var(--border);font-size:11px;color:var(--text2);display:flex;gap:20px}
#ctxMenu{position:fixed;z-index:400;background:var(--panel-bg);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);display:none;min-width:160px;padding:4px}
#ctxMenu .ctx-item{padding:8px 14px;cursor:pointer;border-radius:6px;font-size:13px;transition:all .15s}
#ctxMenu .ctx-item:hover{background:var(--accent);color:#fff}
#zoomControl{position:fixed;bottom:32px;right:16px;z-index:100;background:var(--panel-bg);padding:12px 6px 8px;border-radius:12px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;box-shadow:var(--shadow);width:40px;min-height:170px}
#zoomSlider{-webkit-appearance:none;appearance:none;width:140px;height:6px;background:var(--border);border-radius:3px;outline:none;cursor:pointer;transform:rotate(-90deg);flex-shrink:0}
#zoomSlider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;background:var(--accent);border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 0 8px rgba(74,144,217,.5);transition:box-shadow .2s}
#zoomSlider::-webkit-slider-thumb:hover{box-shadow:0 0 14px rgba(74,144,217,.8)}
#zoomSlider::-moz-range-thumb{width:20px;height:20px;background:var(--accent);border-radius:50%;cursor:pointer;border:2px solid #fff}
#zoomLabel{font-size:12px;color:var(--text2);font-variant-numeric:tabular-nums;min-width:42px;text-align:center}
#zoomSlider::-webkit-slider-runnable-track{height:6px;background:var(--border);border-radius:3px}
#zoomSlider::-moz-range-track{height:6px;background:var(--border);border-radius:3px}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(74,144,217,.3)}50%{box-shadow:0 0 20px rgba(74,144,217,.6)}}
.connecting{animation:pulse .8s infinite}
</style>
</head>
<body>
<div id="app">
    <canvas id="gridCanvas"></canvas>
    <canvas id="connCanvas"></canvas>
    <div id="nodesLayer"></div>
</div>

<div id="toolbar">
    <button onclick="SMTool.addSpineNode()">➕ 添加节点</button>
    <span class="sep"></span>
    <button id="btnConnect" onclick="SMTool.toggleConnectMode()">🔗 连线模式</button>
    <span class="sep"></span>
    <button onclick="SMTool.fitAll()">📐 适合视图</button>
    <button onclick="SMTool.resetView()">🏠 重置视图</button>
    <span class="sep"></span>
    <button id="btnGrid" class="active" onclick="SMTool.toggleGrid()">📏 网格</button>
    <button onclick="SMTool.exportData()">💾 导出</button>
    <button onclick="SMTool.importData()">📥 导入</button>
</div>

<div id="dropZone"><div class="inner"><div class="icon">📂</div>拖拽 Spine 文件到此处<br/><span class="sub">需要 .json/.skel + .atlas + .png</span></div></div>

<div id="conditionEditor">
    <label style="font-size:11px;color:var(--text2);display:block;margin-bottom:6px">过渡条件：</label>
    <input type="text" id="condInput" placeholder="例如：isDead == true" />
    <div class="actions">
        <button class="del" onclick="SMTool.deleteConnection()">删除连线</button>
        <button class="ok" onclick="SMTool.saveCondition()">确定</button>
    </div>
</div>

<div id="ctxMenu">
    <div class="ctx-item" onclick="SMTool.ctxDeleteNode()">🗑️ 删除节点</div>
    <div class="ctx-item" onclick="SMTool.ctxDuplicateNode()">📋 复制节点</div>
</div>

<div id="statusBar">
    <span id="sbNodes">节点: 0</span>
    <span id="sbConns">连线: 0</span>
    <span id="sbFPS">FPS: --</span>
    <span id="sbStatus"></span>
</div>
<div id="zoomControl">
    <input type="range" id="zoomSlider" min="10" max="500" value="100" />
    <span id="zoomLabel">100%</span>
</div>

<!-- Spine WebGL Dual Runtime: 3.8 + 4.3 via unpkg CDN -->
<!-- 3.8: spine.webgl.* namespace | 4.3: flat spine.* namespace -->
<script>
(function() {
    // CDN URLs
    const CDN_38 = 'https://cdn.jsdelivr.net/gh/EsotericSoftware/spine-runtimes@3.8/spine-ts/build/spine-webgl.js';
    const CDN_38_FALLBACK = 'https://raw.githubusercontent.com/EsotericSoftware/spine-runtimes/3.8/spine-ts/build/spine-webgl.js';
    const CDN_42 = 'https://unpkg.com/@esotericsoftware/spine-webgl@4.2.43/dist/iife/spine-webgl.js';
    const CDN_43 = 'https://unpkg.com/@esotericsoftware/spine-webgl@4.3.2/dist/iife/spine-webgl.js';

    function loadScript(url) {
        return new Promise(function(resolve, reject) {
            var s = document.createElement('script');
            s.src = url;
            s.onload = function() { console.log('[Spine] Loaded:', url); resolve(url); };
            s.onerror = function() { console.warn('[Spine] Failed:', url); reject(url); };
            document.head.appendChild(s);
        });
    }

    function tryLoad(url, fallback) {
        return loadScript(url).catch(function() { return fallback ? loadScript(fallback) : Promise.reject('all failed'); });
    }

    // Step 1: Load 3.8, save to window.spine38
    console.log('[Spine] Loading spine-webgl 3.8...');
    tryLoad(CDN_38, CDN_38_FALLBACK).then(function() {
        window.spine38 = window.spine;
        console.log('[Spine] spine-webgl 3.8 ready \u2713 (saved as spine38)');

        // Step 2: Load 4.2.1, save to window.spine42
        console.log('[Spine] Loading spine-webgl 4.2...');
        return loadScript(CDN_42);
    }).then(function() {
        window.spine42 = window.spine;
        console.log('[Spine] spine-webgl 4.2 ready \u2713 (saved as spine42)');

        // Step 3: Load 4.3.2, save to window.spine43
        console.log('[Spine] Loading spine-webgl 4.3...');
        return loadScript(CDN_43);
    }).then(function() {
        window.spine43 = window.spine;
        // Restore 3.8 as default for backward compat
        window.spine = window.spine38;
        console.log('[Spine] spine-webgl 4.3 ready \u2713 (saved as spine43)');
        console.log('[Spine] Triple runtime ready: 3.8 + 4.2 + 4.3');

        var sb = document.getElementById('sbStatus');
        sb.textContent = 'Spine 3.8 + 4.2 + 4.3 \u2713';

        if (window._onSpineReady) window._onSpineReady();
    }).catch(function(err) {
        console.error('[Spine] Failed to load dual runtime:', err);
        var sb = document.getElementById('sbStatus');
        if (window.spine38) {
            sb.textContent = 'Spine 3.8 only (4.3 failed)';
        } else {
            sb.textContent = '\u26A0\uFE0F Spine not loaded';
        }
        if (window._onSpineReady) window._onSpineReady();
    });
})();
</script>

<script>
// ===================== Triple-Runtime Spine Renderer (3.8 + 4.2 + 4.3) =====================
// 3.8: barebones pattern (shader + batcher + skeletonRenderer via spine38.webgl.*)
// 4.2: SceneRenderer pattern (via spine42.*)
// 4.3: SceneRenderer pattern (via spine43.*)
// Version auto-detected from skeleton data; node._spineVer = '3.8' | '4.2' | '4.3'

// ===================== DATA MODEL =====================
const CONN_COLORS = [
    '#ff6b6b', '#ffa94d', '#ffd43b', '#69db7c', '#38d9a9', '#4dabf7',
    '#5c7cfa', '#845ef7', '#e599f7', '#f06595', '#20c997', '#f08c00',
    '#fa5252', '#fd7e14', '#fab005', '#40c057', '#12b886', '#339af0',
    '#3b5bdb', '#7950f2', '#cc5de8', '#e64980', '#0ca678', '#e8590c'
];
function _connColor(idx) { return CONN_COLORS[idx % CONN_COLORS.length]; }

const SMData = {
    nodes: new Map(), connections: [],
    nextId: 1, nextConnId: 1,
    view: { x: 0, y: 0, zoom: 1 },
    connectMode: false, connecting: null,
    selectedNode: null, selectedConnection: null, showGrid: true,
    draggedNode: null, dragOffset: { x: 0, y: 0 },
    isPanning: false, panStart: { x: 0, y: 0 }, viewStart: { x: 0, y: 0 },
    // Bezier control point dragging
    draggingCP: null,       // { connId, which: 'cp1'|'cp2' }
    hoveredCP: null,        // { connId, which: 'cp1'|'cp2' } for highlight
    selectingCP: false,     // flag so mousedown on CP doesn't trigger node select
};

class SpineNodeData {
    constructor(id) {
        this.id = id; this.name = `Node_${id}`;
        this.x = Math.random() * 200 - 100 + window.innerWidth / 2;
        this.y = Math.random() * 200 - 100 + window.innerHeight / 2;
        this.width = 300;
        this.skeletonData = null; this.atlasData = null; this.textureImg = null;
        this.skeleton = null; this.state = null;
        this.animations = []; this.skins = []; this.slots = []; this.bones = [];
        this.version = ''; this.currentAnim = '';
        this.premultipliedAlpha = false;
        // Raw source data for export/import roundtrip
        this._srcSkelJson = null;      // original skeleton JSON object
        this._srcSkelBinBase64 = null; // original .skel binary as base64 string
        this._srcAtlasText = '';       // original atlas text
        this._srcTexDataUrl = '';      // texture PNG as data URL
        this._srcType = '';            // 'json' or 'skel'
        // WebGL resources (3.8 barebones pattern)
        this.canvas = null;          // HTMLCanvasElement
        this.gl = null;              // WebGLRenderingContext
        this.shader = null;          // spine.webgl.Shader
        this.batcher = null;         // spine.webgl.PolygonBatcher
        this.mvp = null;             // spine.webgl.Matrix4
        this.skeletonRenderer = null; // spine.webgl.SkeletonRenderer
        this.glTextures = [];        // spine.webgl.GLTexture[] for cleanup
        this.bounds = null;          // { offset: Vector2, size: Vector2 }
        this.infoCollapsed = true;
    }
}

// ===================== CORE TOOL =====================
const SMTool = {
    init() {
        this.gridCanvas = document.getElementById('gridCanvas');
        this.gridCtx = this.gridCanvas.getContext('2d');
        this.connCanvas = document.getElementById('connCanvas');
        this.connCtx = this.connCanvas.getContext('2d');
        this.nodesLayer = document.getElementById('nodesLayer');
        this.resize();
        window.addEventListener('resize', () => this.resize());

        document.addEventListener('mousedown', e => {
            if (e.target.closest('#toolbar, #ctxMenu, #conditionEditor, #zoomControl, #statusBar')) return;
            if (e.target.closest('input, textarea, select, button')) return;
            this._onMD(e);
        });
        window.addEventListener('mousemove', e => this._onMM(e));
        window.addEventListener('mouseup', e => this._onMU(e));
        window.addEventListener('wheel', e => { if (!e.target.closest('.state-list') && !e.target.closest('.ip-body') && !e.target.closest('#conditionEditor')) { e.preventDefault(); this._onWheel(e); } }, { passive: false });
        this.gridCanvas.addEventListener('contextmenu', e => e.preventDefault());
        document.getElementById('zoomSlider').addEventListener('input', e => this._onZoomSlider(e));

        const dz = document.getElementById('dropZone');
        document.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('show'); });
        dz.addEventListener('dragover', e => e.preventDefault());
        dz.addEventListener('dragleave', () => dz.classList.remove('show'));
        dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('show'); this._onDrop(e); });

        window.addEventListener('keydown', e => this._onKD(e));
        window.addEventListener('click', () => { document.getElementById('ctxMenu').style.display = 'none'; });
        window.addEventListener('dblclick', e => {
            const cp = this._findCP(e.clientX, e.clientY, 18);
            if (cp) {
                const conn = SMData.connections.find(c => c.id === cp.connId);
                if (conn) {
                    const fn = SMData.nodes.get(conn.fromNode), tn = SMData.nodes.get(conn.toNode);
                    if (fn && tn) {
                        const fp = this._getStateConnectorPos(fn, conn.fromState, 'output');
                        const tp = this._getStateConnectorPos(tn, conn.toState, 'input');
                        if (fp && tp) {
                            const def = this._defaultCPOffsets(fp, tp);
                            conn.cp1x = def.cp1x; conn.cp1y = def.cp1y;
                            conn.cp2x = def.cp2x; conn.cp2y = def.cp2y;
                            SMData.hoveredCP = null;
                        }
                    }
                }
            }
        });

        this._lt = performance.now(); this._fc = 0; this._ft = performance.now();
        requestAnimationFrame(t => this._loop(t));
    },

    resize() {
        this.gridCanvas.width = window.innerWidth;
        this.gridCanvas.height = window.innerHeight;
        this.connCanvas.width = window.innerWidth;
        this.connCanvas.height = window.innerHeight;
    },

    worldToCanvas(wx, wy) { const z = SMData.view.zoom; return { x: (wx + SMData.view.x) * z + window.innerWidth / 2, y: (wy + SMData.view.y) * z + window.innerHeight / 2 }; },
    canvasToWorld(sx, sy) { const z = SMData.view.zoom; return { x: (sx - window.innerWidth / 2) / z - SMData.view.x, y: (sy - window.innerHeight / 2) / z - SMData.view.y }; },
    // worldToDOM: same as worldToCanvas because _updatePos applies scale() with transformOrigin:top-left,
    // which means the top-left corner stays at (left, top) regardless of scale.
    worldToDOM(wx, wy) { return this.worldToCanvas(wx, wy); },

    _loop(now) {
        requestAnimationFrame(t => this._loop(t));
        const dt = Math.min((now - this._lt) / 1000, 0.1);
        this._lt = now;
        this._fc++;
        if (now - this._ft >= 1000) {
            document.getElementById('sbFPS').textContent = `FPS: ${Math.round(this._fc * 1000 / (now - this._ft))}`;
            this._fc = 0; this._ft = now;
        }
        var SP38 = window.spine38, SP43 = window.spine43;
        var WGL38 = SP38 && SP38.webgl;
        for (const [, node] of SMData.nodes) {
            if (!node.state || !node.skeleton || !node.gl) continue;

            var gl = node.gl;
            var skeleton = node.skeleton;
            var state = node.state;

            // Update animation (same for both versions)
            state.update(dt);
            state.apply(skeleton);
            skeleton.updateWorldTransform();

            if ((node._spineVer === '4.3' || node._spineVer === '4.2') && node.sceneRenderer && node.sceneRenderer.begin) {
                // --- 4.x rendering: SceneRenderer (shared between 4.2 and 4.3) ---
                gl.viewport(0, 0, node.canvas.width, node.canvas.height);
                gl.clearColor(0, 0, 0, 0);
                gl.clear(gl.COLOR_BUFFER_BIT);
                node.sceneRenderer.begin();
                node.sceneRenderer.drawSkeleton(skeleton);
                node.sceneRenderer.end();
            } else if (node.shader && node.batcher && node.skeletonRenderer && WGL38) {
                // --- 3.8 rendering: barebones pattern ---
                gl.viewport(0, 0, node.canvas.width, node.canvas.height);
                gl.clearColor(0, 0, 0, 0);
                gl.clear(gl.COLOR_BUFFER_BIT);

                node.shader.bind();
                node.shader.setUniformi(WGL38.Shader.SAMPLER, 0);
                node.shader.setUniform4x4f(WGL38.Shader.MVP_MATRIX, node.mvp.values);

                node.batcher.begin(node.shader);
                node.skeletonRenderer.premultipliedAlpha = node.premultipliedAlpha;
                node.skeletonRenderer.draw(node.batcher, skeleton);
                node.batcher.end();

                node.shader.unbind();
            }
        }
        this._renderGrid();
        this._renderConnections();
    },

    _renderGrid() {
        const ctx = this.gridCtx, w = this.gridCanvas.width, h = this.gridCanvas.height;
        ctx.clearRect(0, 0, w, h);
        if (!SMData.showGrid) return;
        const z = SMData.view.zoom, vx = SMData.view.x, vy = SMData.view.y;
        let base = 50; while (base * z < 30) base *= 2; while (base * z > 200) base /= 2;
        const s = base * z, ox = ((w / 2 + vx * z) % s + s) % s, oy = ((h / 2 + vy * z) % s + s) % s;
        ctx.strokeStyle = base >= 200 ? '#ffffff10' : '#ffffff06'; ctx.lineWidth = 1; ctx.beginPath();
        for (let x = ox; x < w; x += s) { ctx.moveTo(x, 0); ctx.lineTo(x, h); }
        for (let y = oy; y < h; y += s) { ctx.moveTo(0, y); ctx.lineTo(w, y); }
        ctx.stroke();
        const cx = w / 2 + vx * z, cy = h / 2 + vy * z;

    },

    _renderConnections() {

        const selConn = SMData.selectedConnection;
        const dragging = SMData.draggingCP;
        for (const conn of SMData.connections) {
            const fn = SMData.nodes.get(conn.fromNode), tn = SMData.nodes.get(conn.toNode);
            if (!fn || !tn) continue;
            const fp = this._getStateConnectorPos(fn, conn.fromState, 'output');
            const tp = this._getStateConnectorPos(tn, conn.toState, 'input');
            if (!fp || !tp) continue;
            const fs = this.worldToCanvas(fp.x, fp.y), ts = this.worldToCanvas(tp.x, tp.y);

            // Use stored control point offsets (world-space), with fallback for legacy connections
            const cp1x = conn.cp1x !== undefined ? conn.cp1x : 50;
            const cp1y = conn.cp1y !== undefined ? conn.cp1y : 0;
            const cp2x = conn.cp2x !== undefined ? conn.cp2x : -50;
            const cp2y = conn.cp2y !== undefined ? conn.cp2y : 0;

            const cp1s = this.worldToCanvas(fp.x + cp1x, fp.y + cp1y);
            const cp2s = this.worldToCanvas(tp.x + cp2x, tp.y + cp2y);

            // Connection color (each connection gets a distinct color from palette)
            const connColor = conn.color || _connColor(SMData.connections.indexOf(conn));

                ctx.lineWidth = isCP1Active ? 2.5 : 1.5;
                ctx.stroke();

                // CP2 dot
                const r2 = isCP2Active ? 8 : 6;
                ctx.fillStyle = isCP2Active ? '#fff' : connColor;
                ctx.beginPath(); ctx.arc(cp2s.x, cp2s.y, r2, 0, Math.PI * 2); ctx.fill();

            // Condition label
            const mt = 0.5;
            const mx = Math.pow(1 - mt, 3) * fs.x + 3 * Math.pow(1 - mt, 2) * mt * cp1s.x + 3 * (1 - mt) * mt * mt * cp2s.x + mt * mt * mt * ts.x;
            const my = Math.pow(1 - mt, 3) * fs.y + 3 * Math.pow(1 - mt, 2) * mt * cp1s.y + 3 * (1 - mt) * mt * mt * cp2s.y + mt * mt * mt * ts.y;

    // Compute default bezier control point offsets (world-space, relative to each endpoint)
    _defaultCPOffsets(fp, tp) {

    _roundRect(ctx, x, y, w, h, r) {

    _getStateConnectorPos(node, stateName, type) {

        const dot = stateEl ? stateEl.querySelector(`.conn-dot.${type === 'output' ? 'output' : 'input'}`) : null;
        if (dot) { const r = dot.getBoundingClientRect(); return this.canvasToWorld(r.left + r.width / 2, r.top + r.height / 2); }
        const rect = el.getBoundingClientRect();

    // Find which connection's control point is near screen position (sx, sy)
    // Returns { connId, which: 'cp1'|'cp2' } or null
    _findCP(sx, sy, radius) {
        radius = radius || 12;
        for (const c of SMData.connections) {
            const fn = SMData.nodes.get(c.fromNode), tn = SMData.nodes.get(c.toNode);
            if (!fn || !tn) continue;
            const fp = this._getStateConnectorPos(fn, c.fromState, 'output');
            const tp = this._getStateConnectorPos(tn, c.toState, 'input');
            if (!fp || !tp) continue;
            const cp1x = c.cp1x !== undefined ? c.cp1x : 50;
            const cp1y = c.cp1y !== undefined ? c.cp1y : 0;
            const cp2x = c.cp2x !== undefined ? c.cp2x : -50;
            const cp2y = c.cp2y !== undefined ? c.cp2y : 0;
            const cp1s = this.worldToCanvas(fp.x + cp1x, fp.y + cp1y);
            const cp2s = this.worldToCanvas(tp.x + cp2x, tp.y + cp2y);

    _onMD(e) {

    _onMM(e) {

    _onMU(e) {

            const target = this._findTarget(e.clientX, e.clientY);

                const fn = SMData.nodes.get(SMData.connecting.nodeId);
                const tn = SMData.nodes.get(target.nodeId);

                const tp = this._getStateConnectorPos(tn, target.stateName, 'input');

                const colorIdx = SMData.connections.length;

    },

    _onWheel(e) {

        SMData.view.zoom = Math.max(0.1, Math.min(5, SMData.view.zoom * factor));
        const mx = e.clientX - window.innerWidth / 2, my = e.clientY - window.innerHeight / 2;

    _onZoomSlider(e) {
        const pct = parseInt(e.target.value) / 100;
        const oz = SMData.view.zoom;
        SMData.view.zoom = pct;
        const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
        SMData.view.x += cx * (1 / SMData.view.zoom - 1 / oz);
        SMData.view.y += cy * (1 / SMData.view.zoom - 1 / oz);

    },

    _syncZoomUI() {
        const pct = Math.round(SMData.view.zoom * 100);
        document.getElementById('zoomLabel').textContent = pct + '%';
        const slider = document.getElementById('zoomSlider');
        if (Math.abs(parseInt(slider.value) - pct) > 1) slider.value = pct;
    },

    _onKD(e) { if (e.target.tagName === 'INPUT') return; if (e.key === 'Delete' && SMData.selectedNode) this.deleteNode(SMData.selectedNode); if (e.key === 'Escape') { SMData.connecting = null; SMData.connectMode = false; SMData.selectedConnection = null; document.getElementById('btnConnect').classList.remove('active'); document.getElementById('conditionEditor').classList.remove('show'); this._updateSel(); this._updateStateRowColors(); } },

    _onDrop(e) {

        const groups = {};

            let base = f.name; for (const ext of ['.json', '.skel', '.atlas', '.png', '.jpg', '.jpeg']) { if (base.toLowerCase().endsWith(ext)) { base = base.slice(0, -ext.length); break; } }

    async _createNode(fileGroup, baseName) {

    // === SPINE LOADING (multi-version: auto-detects 3.x vs 4.x) ===
    async _loadSpine(node, fileGroup) {
        console.log(`[Spine] Loading "${node.name}"...`, Object.keys(fileGroup));

        const readFile = (file) => new Promise((resolve, reject) => {
            const r = new FileReader(); r.onerror = () => reject(new Error(`Cannot read ${file.name}`));
            const ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'png' || ext === 'jpg' || ext === 'jpeg') { r.onload = () => resolve({ t: 'img', d: r.result, n: file.name }); r.readAsDataURL(file); }
            else if (ext === 'skel') { r.onload = () => resolve({ t: 'bin', d: new Uint8Array(r.result), n: file.name }); r.readAsArrayBuffer(file); }
            else if (ext === 'json') {
                // Read as binary first, then auto-detect: text JSON vs misnamed .skel binary

                    const buf = new Uint8Array(r.result);
                    // Check if it looks like text JSON (starts with '{' or '[' after optional BOM/whitespace)

                        const txt = new TextDecoder('utf-8').decode(buf);
                        resolve({ t: 'txt', d: txt, n: file.name });
                    } else {
                        // Binary content → treat as .skel
                        console.log('[Spine]   ' + file.name + ' has .json extension but binary content → treating as .skel');
                        resolve({ t: 'bin', d: buf, n: file.name });
                    }
                };
                r.readAsArrayBuffer(file);
            }
            else { r.onload = () => resolve({ t: 'txt', d: r.result, n: file.name }); r.readAsText(file); }
        });

        const results = []; for (const k of Object.keys(fileGroup)) { const r = await readFile(fileGroup[k]); if (r) results.push(r); }
        console.log('[Spine] Read:', results.map(r => `${r.t}:${r.n}`).join(', '));

        let atlasText = '', pngUrl = '', skelBin = null, skelJson = null;
        for (const r of results) {
            if (r.t === 'txt') {

                try {
                    const j = JSON.parse(s);

                    if (j.bones || j.slots || j.skins || j.animations || j.events
                        || (j.skeleton && (typeof j.skeleton === 'object')
                            && (j.bones !== undefined || j.slots !== undefined || j.skins !== undefined || j.animations !== undefined))) {
                        skelJson = j;
                        console.log('[Spine] ✓ Detected JSON skeleton: bones=' + (j.bones ? j.bones.length : 0) + ', anims=' + (j.animations ? Object.keys(j.animations).length : 0));
                    } else {
                        // Valid JSON but not a Spine skeleton → log keys for debugging
                        console.warn('[Spine] ⚠ JSON parsed but NOT a Spine skeleton. Top-level keys:', Object.keys(j).join(', '), '| Sample:', JSON.stringify(j).slice(0, 200));
                    }
                } catch (e) {
                    // Not valid JSON → likely atlas text
                    console.log('[Spine]   txt not JSON (' + r.n + '), treating as atlas');
                    if (!atlasText) atlasText = r.d;
                }
            }
            else if (r.t === 'img') pngUrl = r.d;
            else if (r.t === 'bin') skelBin = r.d;

        if (!pngUrl) throw new Error('No PNG found'); if (!atlasText) throw new Error('No .atlas found');
        if (!skelJson && !skelBin) throw new Error('No skeleton (.json/.skel) found');

        // --- Detect version and choose runtime ---
        let detectedVersion = '';
        if (skelJson) {
            detectedVersion = (skelJson.skeleton && skelJson.skeleton.spine) || '';
        } else if (skelBin) {
            try {
                const bytes = skelBin;
                // Use 4.3's BinaryInput to read version (avoid varint bugs)
                // Fallback: simple detection for 3.x vs 4.x by known header patterns
                // 4.3 binary starts with 2x int32 hashes, then version string
                // 3.8 binary starts with string hash + string version

        console.log(`[Spine] Detected version: "${detectedVersion}"`);
        // Also detect 4.x atlas format: "pma:" lines only exist in 4.x+ atlases
        const atlasIs4x = /^pma\s*:/m.test(atlasText);

        // --- Determine runtime: 3.8 vs 4.2 vs 4.3 ---

        if (detectedVersion && detectedVersion.match(/^4\.[3-9]/)) useVer = '4.3';

        else if (detectedVersion && detectedVersion.match(/^3\.\d/)) useVer = '3.8';
        else if (!detectedVersion) {

        const pad = Math.max(100, Math.ceil(Math.max(boundsSize.x, boundsSize.y) * 0.4));

    // Fallback bounds computation (3.8: drawOrder is array, slot.attachment)
    _computeBoundsManually(skeleton, offset, size) {
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        const drawOrder = skeleton.drawOrder;
        if (!drawOrder || !Array.isArray(drawOrder)) { offset.set(0, 0); size.set(100, 100); return; }
        const verts = [];
        for (let i = 0; i < drawOrder.length; i++) {
            const slot = drawOrder[i];
            if (!slot || !slot.bone || !slot.bone.active) continue;
            var att;
            try { att = slot.getAttachment(); } catch(e) { att = slot.attachment; }
            if (!att || typeof att.computeWorldVertices !== 'function') continue;
            let vc;
            if (att.worldVerticesLength) {
                vc = att.worldVerticesLength;
            } else if (att.uvs && att.uvs.length >= 8) {
                vc = 8;
            } else {
                continue;
            }
            if (verts.length < vc) verts.length = vc;

                    maxY = Math.max(maxY, verts[j + 1]);
                }

        }
        if (!isFinite(minX)) { offset.set(0, 0); size.set(100, 100); return; }
        offset.set(minX, minY);
        size.set(maxX - minX, maxY - minY);
    },

    // Update state row background colors based on connections they participate in

    _onStateClick(nid, name) { const node = SMData.nodes.get(nid); if (!node || !node.state) return; if (SMData.connectMode) { SMData.connectMode = false; document.getElementById('btnConnect').classList.remove('active'); SMData.connecting = null; this.gridCanvas.style.cursor = 'default'; this._updateSel(); } node.state.setAnimation(0, name, true); node.currentAnim = name; this._updateEl(node); this._updateStateRowColors(); },

                const fp = this._getStateConnectorPos(fn, SMData.connecting.stateName, 'output');
                const tp = this._getStateConnectorPos(tn, name, 'input');
                const def = fp && tp ? this._defaultCPOffsets(fp, tp) : { cp1x: 50, cp1y: 0, cp2x: -50, cp2y: 0 };
                const colorIdx = SMData.connections.length;
                SMData.connections.push({ id: SMData.nextConnId++, fromNode: SMData.connecting.nodeId, fromState: SMData.connecting.stateName, toNode: nid, toState: name, condition: '', cp1x: def.cp1x, cp1y: def.cp1y, cp2x: def.cp2x, cp2y: def.cp2y, color: _connColor(colorIdx) });
            }
            SMData.connecting = null; this._updateSel(); this._updateSB(); this._updateStateRowColors();
        }
    },

    _findTarget(mx, my) { for (const [, n] of SMData.nodes) { const el = this._getEl(n.id); if (!el) continue; for (const row of el.querySelectorAll('.state-row')) { const dot = row.querySelector('.conn-dot.input'); if (dot) { const r = dot.getBoundingClientRect(); if (Math.sqrt((mx - r.left - r.width / 2) ** 2 + (my - r.top - r.height / 2) ** 2) < 20) return { nodeId: n.id, stateName: row.dataset.state, type: 'input' }; } } } return null; },
    _highlightTarget(mx, my) { for (const [, n] of SMData.nodes) { const el = this._getEl(n.id); if (!el) continue; for (const row of el.querySelectorAll('.state-row')) { const dot = row.querySelector('.conn-dot.input'); if (dot) { const r = dot.getBoundingClientRect(); const near = Math.sqrt((mx - r.left - r.width / 2) ** 2 + (my - r.top - r.height / 2) ** 2) < 20; dot.style.transform = near ? 'scale(1.8)' : ''; dot.style.background = near ? '#4a90d9' : ''; } } } },

    _checkConditionClick(mx, my) {
        for (const c of SMData.connections) {
            const fn = SMData.nodes.get(c.fromNode), tn = SMData.nodes.get(c.toNode); if (!fn || !tn) continue;
            const fp = this._getStateConnectorPos(fn, c.fromState, 'output'), tp = this._getStateConnectorPos(tn, c.toState, 'input'); if (!fp || !tp) continue;
            const fs = this.worldToCanvas(fp.x, fp.y), ts = this.worldToCanvas(tp.x, tp.y);
            const cp1x = c.cp1x !== undefined ? c.cp1x : 50;
            const cp1y = c.cp1y !== undefined ? c.cp1y : 0;
            const cp2x = c.cp2x !== undefined ? c.cp2x : -50;
            const cp2y = c.cp2y !== undefined ? c.cp2y : 0;
            const cp1s = this.worldToCanvas(fp.x + cp1x, fp.y + cp1y);
            const cp2s = this.worldToCanvas(tp.x + cp2x, tp.y + cp2y);
            const mt = 0.5;
            const mx2 = Math.pow(1 - mt, 3) * fs.x + 3 * Math.pow(1 - mt, 2) * mt * cp1s.x + 3 * (1 - mt) * mt * mt * cp2s.x + mt * mt * mt * ts.x;
            const my2 = Math.pow(1 - mt, 3) * fs.y + 3 * Math.pow(1 - mt, 2) * mt * cp1s.y + 3 * (1 - mt) * mt * mt * cp2s.y + mt * mt * mt * ts.y;
            if (Math.sqrt((mx - mx2) ** 2 + (my - my2) ** 2) < 30) {
                SMData.selectedConnection = c.id;
                this._updateStateRowColors();
                this._showCond(c, mx, my); return true;
            }
        }
        return false;
    },

    _showCond(conn, sx, sy) { const ed = document.getElementById('conditionEditor'); ed.classList.add('show'); ed.style.left = sx + 'px'; ed.style.top = sy + 'px'; ed._cid = conn.id; document.getElementById('condInput').value = conn.condition || ''; document.getElementById('condInput').focus(); },

    // Public actions
    addSpineNode() { const id = SMData.nextId++; const node = new SpineNodeData(id); const wp = this.canvasToWorld(window.innerWidth / 2, window.innerHeight / 2); node.x = wp.x; node.y = wp.y; SMData.nodes.set(id, node); this._createEl(node); this._updatePos(node); SMData.selectedNode = id; this._updateSel(); this._updateSB(); },
    deleteNode(nid) { SMData.connections = SMData.connections.filter(c => c.fromNode !== nid && c.toNode !== nid); const node = SMData.nodes.get(nid); if (node) { if (node.state) node.state.clearTracks(); if (node.glTextures) node.glTextures.forEach(t => { try { t.dispose(); } catch(e) {} }); if (node.batcher) { try { node.batcher.dispose(); } catch(e) {} } if (node.shader) { try { node.shader.dispose(); } catch(e) {} } } const el = this._getEl(nid); if (el) el.remove(); SMData.nodes.delete(nid); if (SMData.selectedNode === nid) SMData.selectedNode = null; this._updateSel(); this._updateSB(); this._updateStateRowColors(); },
    toggleInfoPanel(nid) { const node = SMData.nodes.get(nid); if (!node) return; node.infoCollapsed = !node.infoCollapsed; const panel = document.getElementById(`info-${nid}`); if (panel) panel.classList.toggle('show', !node.infoCollapsed); },
    _togglePMA(nid, v) { const node = SMData.nodes.get(nid); if (node) node.premultipliedAlpha = v; },
    toggleConnectMode() { SMData.connectMode = !SMData.connectMode; document.getElementById('btnConnect').classList.toggle('active', SMData.connectMode); SMData.connecting = null; this.gridCanvas.style.cursor = SMData.connectMode ? 'crosshair' : 'default'; this._updateSel(); },
    saveCondition() { const ed = document.getElementById('conditionEditor'); const c = SMData.connections.find(x => x.id === ed._cid); if (c) c.condition = document.getElementById('condInput').value.trim(); ed.classList.remove('show'); },
    deleteConnection() { const ed = document.getElementById('conditionEditor'); SMData.connections = SMData.connections.filter(x => x.id !== ed._cid); SMData.selectedConnection = null; ed.classList.remove('show'); this._updateSB(); this._updateStateRowColors(); },
    fitAll() { if (!SMData.nodes.size) return; let mx = Infinity, my = Infinity, Mx = -Infinity, My = -Infinity; for (const [, n] of SMData.nodes) { mx = Math.min(mx, n.x); my = Math.min(my, n.y); Mx = Math.max(Mx, n.x + n.width); My = Math.max(My, n.y + 400); } SMData.view.zoom = Math.min(window.innerWidth / (Mx - mx + 200), window.innerHeight / (My - my + 200), 2); SMData.view.x = -(mx + Mx) / 2; SMData.view.y = -(my + My) / 2; this._updateAllPos(); this._syncZoomUI(); },
    resetView() { SMData.view = { x: 0, y: 0, zoom: 1 }; this._updateAllPos(); this._syncZoomUI(); },
    toggleGrid() { SMData.showGrid = !SMData.showGrid; document.getElementById('btnGrid').classList.toggle('active', SMData.showGrid); },
    ctxDeleteNode() { if (SMData.selectedNode) this.deleteNode(SMData.selectedNode); document.getElementById('ctxMenu').style.display = 'none'; },
    ctxDuplicateNode() { if (!SMData.selectedNode) return; const orig = SMData.nodes.get(SMData.selectedNode); if (!orig) return; const id = SMData.nextId++; const node = new SpineNodeData(id); node.name = orig.name + ' (副本)'; node.x = orig.x + 50; node.y = orig.y + 50; node._srcSkelJson = orig._srcSkelJson; node._srcSkelBinBase64 = orig._srcSkelBinBase64; node._srcAtlasText = orig._srcAtlasText; node._srcTexDataUrl = orig._srcTexDataUrl; node._srcType = orig._srcType; SMData.nodes.set(id, node); this._createEl(node); this._updatePos(node); if (node._srcAtlasText && node._srcTexDataUrl && (node._srcSkelJson || node._srcSkelBinBase64)) { this._loadFromSourceData(node).then(() => this._updateEl(node)).catch(err => console.error('[Duplicate] Failed to restore rendering:', err)); } this._updateSB(); document.getElementById('ctxMenu').style.display = 'none'; },
    exportData() { const data = { nodes: [], connections: SMData.connections.map(c => ({ id: c.id, fromNode: c.fromNode, fromState: c.fromState, toNode: c.toNode, toState: c.toState, condition: c.condition, cp1x: c.cp1x, cp1y: c.cp1y, cp2x: c.cp2x, cp2y: c.cp2y, color: c.color })), view: SMData.view }; for (const [, n] of SMData.nodes) data.nodes.push({ id: n.id, name: n.name, x: n.x, y: n.y, animations: n.animations, skins: n.skins, slots: n.slots, bones: n.bones, version: n.version, currentAnim: n.currentAnim, premultipliedAlpha: n.premultipliedAlpha, _srcSkelJson: n._srcSkelJson, _srcSkelBinBase64: n._srcSkelBinBase64, _srcAtlasText: n._srcAtlasText, _srcTexDataUrl: n._srcTexDataUrl, _srcType: n._srcType }); const j = JSON.stringify(data, null, 2), b = new Blob([j], { type: 'application/json' }), u = URL.createObjectURL(b), a = document.createElement('a'); a.href = u; a.download = 'spine-state-machine.json'; a.click(); URL.revokeObjectURL(u); },
    importData() { const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json'; inp.onchange = e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => { try { const d = JSON.parse(r.result); if (d.view) SMData.view = d.view; SMData.connections = d.connections || []; for (const nd of (d.nodes || [])) { const node = new SpineNodeData(nd.id); node.name = nd.name; node.x = nd.x || 0; node.y = nd.y || 0; node.animations = nd.animations || []; node.skins = nd.skins || []; node.slots = nd.slots || []; node.bones = nd.bones || []; node.version = nd.version || ''; node.currentAnim = nd.currentAnim || ''; node.premultipliedAlpha = nd.premultipliedAlpha || false; node._srcSkelJson = nd._srcSkelJson || null; node._srcSkelBinBase64 = nd._srcSkelBinBase64 || null; node._srcAtlasText = nd._srcAtlasText || ''; node._srcTexDataUrl = nd._srcTexDataUrl || ''; node._srcType = nd._srcType || ''; SMData.nodes.set(nd.id, node); SMData.nextId = Math.max(SMData.nextId, nd.id + 1); this._createEl(node); this._updatePos(node); if (node._srcAtlasText && node._srcTexDataUrl && (node._srcSkelJson || node._srcSkelBinBase64)) { this._loadFromSourceData(node).then(() => this._updateEl(node)).catch(err => console.error('[Import] Failed to restore rendering:', err)); } } SMData.nextConnId = Math.max(SMData.nextConnId, ...SMData.connections.map(c => c.id), 0) + 1; this._updateAllPos(); this._updateSB(); this._updateStateRowColors(); } catch (err) { alert('导入失败：无效的 JSON 文件\n' + err.message); } }; r.readAsText(f); }; inp.click(); },

    // Reconstruct WebGL rendering from stored source data (for import roundtrip)
    async _loadFromSourceData(node) {
        const SP = window.spine; const WGL = SP && SP.webgl;
        if (!SP) throw new Error('No spine runtime available');
        if (!WGL) throw new Error('spine-webgl not loaded');

        const atlasText = node._srcAtlasText;
        const texDataUrl = node._srcTexDataUrl;
        const srcType = node._srcType || 'json';

        console.log(`[Import] Restoring "${node.name}" from ${srcType} source (atlas:${atlasText.length}chars, tex:${texDataUrl.length}chars)`);

        // Load image from data URL
        const img = new Image();
        await new Promise((res, rej) => { img.onload = () => { console.log(`[Import] Image: ${img.width}x${img.height}`); res(); }; img.onerror = () => rej(new Error('Texture image load failed')); img.src = texDataUrl; });
        node.textureImg = img;

        // Create atlas
        const atlas = new SP.TextureAtlas(atlasText, function(path) {
            return new SP.FakeTexture(img);
        });
        node.atlasData = atlas;
        console.log(`[Import] Atlas: ${atlas.pages.length} page(s), ${atlas.regions.length} region(s)`);

        // Parse skeleton
        const al = new SP.AtlasAttachmentLoader(atlas);
        let sd, skelJson;
        try {
            if (srcType === 'skel' && node._srcSkelBinBase64) {
                const skelBin = this._base64ToUint8(node._srcSkelBinBase64);
                console.log('[Import] Parsing .skel (' + skelBin.length + ' bytes)');
                const bl = new SP.SkeletonBinary(al); bl.scale = 1;
                sd = bl.readSkeletonData(skelBin);
            } else {
                skelJson = node._srcSkelJson;
                if (!skelJson) throw new Error('No skeleton JSON data');
                console.log('[Import] Parsing JSON skeleton: bones=' + (skelJson.bones ? skelJson.bones.length : 0));
                const jl = new SP.SkeletonJson(al); jl.scale = 1;
                sd = jl.readSkeletonData(skelJson);
            }
        } catch (e) {
            throw new Error('Skeleton parse failed: ' + e.message);
        }
        node.skeletonData = sd;
        node.version = sd.version || node.version;
        node.bones = []; for (let i = 0; i < sd.bones.length; i++) node.bones.push(sd.bones[i].name);
        console.log(`[Import] Skeleton v${node.version}: ${sd.bones.length} bones`);

        // Create skeleton
        const sk = new SP.Skeleton(sd);
        if (sd.defaultSkin) sk.setSkin(sd.defaultSkin);
        sk.setToSetupPose();
        if (atlas.pages.length > 0 && atlas.pages[0].pma) { node.premultipliedAlpha = true; }
        node.skeleton = sk;

        // Animation state
        const stateData = new SP.AnimationStateData(sd);
        const state = new SP.AnimationState(stateData);
        node.state = state;
        if (node.animations.length > 0) {
            const animName = node.currentAnim || node.animations[0].name;
            state.setAnimation(0, animName, true);
            node.currentAnim = animName;
            console.log(`[Import] Playing: "${animName}"`);
        }

        // Setup canvas + WebGL renderer
        const wrap = document.querySelector(`#sn-${node.id} .spine-canvas-wrap`); if (!wrap) return;
        const oldC = wrap.querySelector('canvas'); if (oldC) oldC.remove();
        const ph = wrap.querySelector('div'); if (ph) ph.remove();

        // Compute bounds
        sk.setToSetupPose();
        sk.updateWorldTransform();
        const boundsOff = new SP.Vector2(), boundsSize = new SP.Vector2();
        try {
            if (typeof sk.getBounds === 'function') {
                sk.getBounds(boundsOff, boundsSize, []);
            } else {
                this._computeBoundsManually(sk, boundsOff, boundsSize);
            }
        } catch (e) {
            console.warn('[Import] getBounds failed, using fallback:', e.message);
            this._computeBoundsManually(sk, boundsOff, boundsSize);
        }
        node.bounds = { offset: boundsOff, size: boundsSize };
        const pad = Math.max(100, Math.ceil(Math.max(boundsSize.x, boundsSize.y) * 0.4));
        const cw = Math.max(400, Math.ceil(boundsSize.x) + pad * 2);
        const ch = Math.max(400, Math.ceil(boundsSize.y) + pad * 2);

        // Create canvas
        const canvas = document.createElement('canvas'); canvas.width = cw; canvas.height = ch;
        canvas.style.display = 'block';
        canvas.style.width = cw + 'px';
        canvas.style.height = ch + 'px';
        wrap.appendChild(canvas);
        node.canvas = canvas;
        node.width = Math.max(cw + 10, node.width, 260);

        // Clean up old resources
        if (node.batcher) { try { node.batcher.dispose(); } catch(e) {} }
        if (node.shader) { try { node.shader.dispose(); } catch(e) {} }
        if (node.glTextures) { node.glTextures.forEach(t => { try { t.dispose(); } catch(e) {} }); }
        node.glTextures = [];

        // Get WebGL context
        var gl = canvas.getContext('webgl2', { alpha: false }) || canvas.getContext('webgl', { alpha: false });
        if (!gl) throw new Error('WebGL not available');
        node.gl = gl;

        // Create shader, batcher, MVP, renderer
        node.shader = WGL.Shader.newTwoColoredTextured(gl);
        node.batcher = new WGL.PolygonBatcher(gl);
        node.mvp = new WGL.Matrix4();
        node.skeletonRenderer = new WGL.SkeletonRenderer(gl);

        node.mvp.ortho2d(0, 0, cw - 1, ch - 1);

        // Create GL textures
        for (var i = 0; i < atlas.pages.length; i++) {
            var page = atlas.pages[i];
            try {
                var glTex = new WGL.GLTexture(gl, img, false);
                page.texture = glTex;
                node.glTextures.push(glTex);
            } catch (e) {
                console.error('[Import] GLTexture failed for "' + page.name + '":', e);
            }
        }
        for (var r = 0; r < atlas.regions.length; r++) {
            atlas.regions[r].texture = atlas.regions[r].page.texture;
        }

        // Center skeleton
        sk.x = cw / 2 - (boundsOff.x + boundsSize.x / 2);
        sk.y = ch / 2 - (boundsOff.y + boundsSize.y / 2);
        sk.updateWorldTransform();

        console.log(`[Import] ✓ "${node.name}" restored successfully`);
    },
};

// Init - wait for spine runtime to load
function _doInit() {
    SMTool.init(); SMTool._updateSB();
    const ce = document.getElementById('conditionEditor');
    ce.addEventListener('keydown', e => { if (e.key === 'Enter') SMTool.saveCondition(); if (e.key === 'Escape') ce.classList.remove('show'); });
    console.log('\uD83C\uDFAC Spine Animation State Machine ready! (spine-webgl 3.8)');
    console.log('  \u62D6\u62FD spine \u6587\u4EF6\u4E09\u4EF6\u5957 (.json/.skel + .atlas + .png) \u5230\u753B\u5E03\u4E0A');
    console.log('  Alt+\u62D6\u62FD=\u5E73\u79FB | \u6EDA\u8F6E=\u7F29\u653E');
}

window.addEventListener('DOMContentLoaded', () => {
    if (window.spine && window.spine.webgl && window.spine.webgl.SkeletonRenderer) {
        _doInit();
    } else {
        window._onSpineReady = _doInit;
        setTimeout(() => { if (!window.spine || !window.spine.webgl) { console.warn('[Init] Spine runtime timeout'); _doInit(); } }, 10000);
    }
});
</script>
